# AMHS/SWIM Gateway Test Tool - Default Configuration
# This file is bundled within the application. 
# To override these settings, create a file at 'config/test.properties' in the application directory.

# --- AMHS Connection ---
# The MTA host/IP for AMHS connectivity
amhs.mta.host=localhost
# The X.400 server port (default P1/P2/P3/P7)
amhs.mta.port=10000
# Connectivity for AMHS is via AMQP 1.0 gateway as per specialized SWIM requirements.

# --- SWIM (Solace) Connection ---
# The Solace broker host (can be a hostname or a full URL like tcp://host:port)
swim.broker.host=localhost
# The Solace broker port
swim.broker.port=55555
# Message VPN name
swim.broker.vpn=default
# Authentication credentials
swim.broker.user=default
swim.broker.password=default

# --- Directory (LDAP) ---
directory.host=ldap://localhost:389
directory.dn=cn=admin
directory.password=secret

# --- Gateway Constraints ---
gateway.max_recipients=512
gateway.max_size=1000000
# Default Target Settings
gateway.default_topic=TEST.TOPIC
gateway.test_recipient=VVTSYMYX
